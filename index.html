<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomato Disease Detector | Powered by Ameer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; z-index: -1; animation: float 15s infinite alternate;
        }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(15%, 15%); } }
        @keyframes loading { 0%, 100% { transform: scaleY(0.5); opacity: 0.3; } 50% { transform: scaleY(1.5); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative">

    <div class="blob" style="top: -100px; left: -100px;"></div>
    <div class="blob" style="bottom: -100px; right: -100px; animation-delay: -7s;"></div>

    <div class="max-w-md w-full glass rounded-[3rem] p-10 shadow-2xl border border-white relative transition-all duration-500">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 bg-green-100/50 px-3 py-1 rounded-full mb-4">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-[10px] font-bold text-green-700 uppercase tracking-widest">AI Scanner Active</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tighter leading-none">Tomato Plant <br><span class="text-green-600">Disease Detector</span></h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.4em] mt-3 uppercase">Powered by Ameer and Team</p>
        </div>

        <div id="uploadSection" class="space-y-4">
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="showPreview(event)">
            <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="camera" onchange="showPreview(event, true)">

            <div onclick="document.getElementById('fileInput').click()" class="group relative border-2 border-dashed border-slate-200 rounded-[2.5rem] p-8 text-center hover:border-green-400 transition-all cursor-pointer active:scale-95">
                <div id="placeholder">
                    <div class="text-4xl mb-2">📁</div>
                    <p class="text-slate-500 font-bold text-[10px] uppercase tracking-widest">Select From Gallery</p>
                </div>
                <img id="imgPreview" class="hidden w-full h-48 object-cover rounded-[1.5rem] shadow-xl border-2 border-white">
            </div>

            <button onclick="document.getElementById('cameraInput').click()" class="w-full bg-green-500 text-white py-4 rounded-[1.5rem] font-bold text-xs uppercase tracking-widest hover:bg-green-600 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
                <span>📸</span> Take Live Photo
            </button>

            <button onclick="startAnalysis()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-bold text-sm uppercase tracking-widest hover:bg-black active:scale-95 transition-all shadow-xl shadow-slate-200">
                Start AI Analysis
            </button>
        </div>

        <div id="resultBox" class="hidden mt-6 space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-50 shadow-inner">
                <div id="statusBadge" class="px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest inline-block mb-3">Status</div>
                <h2 id="diseaseName" class="text-2xl font-extrabold text-slate-800 mb-1">Diagnosis</h2>
                
                <div class="w-full bg-slate-100 h-2 rounded-full mt-4 overflow-hidden">
                    <div id="confidenceBar" class="bg-green-500 h-full w-0 transition-all duration-1000 ease-out"></div>
                </div>
                <p id="confText" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest text-right">0% Confidence</p>
                
                <div class="mt-6 text-left bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100">
                    <p class="text-[8px] font-black text-green-600 uppercase mb-2 tracking-widest">Treatment Plan</p>
                    <p id="solutionText" class="text-xs text-slate-600 font-medium leading-relaxed italic">---</p>
                </div>
            </div>

            <button onclick="resetApp()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-[1.5rem] font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all">
                🔄 Scan New Leaf
            </button>
        </div>

        <div id="loader" class="hidden mt-10 text-center">
            <div class="flex justify-center gap-1 mb-4">
                <div class="w-2 h-8 bg-green-500 rounded-full" style="animation: loading 1s infinite 0s"></div>
                <div class="w-2 h-8 bg-green-500 rounded-full" style="animation: loading 1s infinite 0.1s"></div>
                <div class="w-2 h-8 bg-green-500 rounded-full" style="animation: loading 1s infinite 0.2s"></div>
            </div>
            <p class="text-[10px] font-black text-green-600 uppercase tracking-widest">Scanning Pixels...</p>
        </div>
    </div>

    <script>
        function showPreview(event, isCamera = false) {
            const preview = document.getElementById('imgPreview');
            const placeholder = document.getElementById('placeholder');
            const file = event.target.files[0];
            if (file) {
                if(isCamera) {
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    document.getElementById('fileInput').files = dataTransfer.files;
                }
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        async function startAnalysis() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) return alert("Select a leaf photo first!");

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('uploadSection').classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('https://tomato-ai-brain-1.onrender.com/predict', { 
    method: 'POST', 
    body: formData 
});
                const data = await response.json();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultBox').classList.remove('hidden');
                
                document.getElementById('diseaseName').innerText = data.disease;
                document.getElementById('solutionText').innerText = data.solution;
                document.getElementById('confText').innerText = `${data.confidence}% Confidence`;
                
                setTimeout(() => { document.getElementById('confidenceBar').style.width = data.confidence + '%'; }, 100);

                const badge = document.getElementById('statusBadge');
                badge.innerText = data.status;
                badge.className = data.status === "HEALTHY" 
                    ? "px-4 py-1 rounded-full text-[9px] font-black bg-green-100 text-green-700 uppercase tracking-widest inline-block mb-3"
                    : "px-4 py-1 rounded-full text-[9px] font-black bg-orange-100 text-orange-700 uppercase tracking-widest inline-block mb-3";

            } catch (error) {
                alert("Connection Offline!");
                resetApp();
            }
        }

        function resetApp() {
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('confidenceBar').style.width = '0%';
            document.getElementById('fileInput').value = "";
            document.getElementById('cameraInput').value = "";
        }
    </script>
</body>
</html>
